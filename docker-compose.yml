version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: agentos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentos
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - agentos-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  agentos-network:
    driver: bridge
